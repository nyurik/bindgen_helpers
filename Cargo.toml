[package]
name = "bindgen_helpers"
description = "Utilities to rename, change case, and fix Rust code generated by bindgen from C headers"
keywords = ["ffi", "bindgen", "rename", "case", "convert"]
categories = ["development-tools::ffi", "development-tools::build-utils"]
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[dependencies]
bindgen.workspace = true
convert_case.workspace = true
regex.workspace = true
serde.workspace = true
thiserror.workspace = true
toml.workspace = true

[lints]
workspace = true

[workspace]
resolver = "2"
members = [".", "cli", "tests"]
default-members = [".", "cli", "tests"]

[workspace.package]
version = "0.6.1"
authors = ["Yuri Astrakhan <YuriAstrakhan@gmail.com>"]
repository = "https://github.com/nyurik/bindgen_helpers"
edition = "2021"
license = "MIT OR Apache-2.0"
rust-version = "1.71"

[workspace.dependencies]
bindgen = ">=0.72.0"
bindgen_helpers = { path = ".", version = "0.6.1" }
convert_case = "0.11.0"
insta = "1.43.1"
regex = "1.11.1"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
toml = "0.9.6"

[workspace.lints.rust]
unsafe_code = "forbid"
unused_qualifications = "warn"

[workspace.lints.clippy]
# Restrictions
panic_in_result_fn = "warn"
todo = "warn"
unwrap_used = "warn"
# Pedantics without being too noisy
cargo = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
# Relax some
multiple_crate_versions = "allow"

#[patch.crates-io]
#bindgen = { path = "../../rust/lang/rust-bindgen/bindgen" }
